# GitHub Action to update Recent GitHub Activity in README
# Uses jamesgeorge007/github-activity-readme to populate the
# <!--START_SECTION:activity--> block in your README.

name: Update GitHub Activity

on:
  schedule:
    - cron: "*/30 * * * *" # Runs every 30 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update README with recent activity

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "chore: update README with recent activity"
          MAX_LINES: 5
